<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Piano Tiles Game</title>

<style>
body{
  margin:0;
  text-align:center;
  font-family:sans-serif;
  background:#121212;
  color:white;
}

h1{
  margin-top:10px;
}

#score{
  font-size:24px;
  margin:10px;
}

#game{
  width:320px;
  height:520px;
  margin:auto;
  background:white;
  position:relative;
  overflow:hidden;
  border:4px solid black;
}

.tile{
  width:80px;
  height:130px;
  position:absolute;
  background:black;
}

#startBtn{
  margin:10px;
  padding:10px 20px;
  font-size:18px;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>Piano Tiles</h1>
<div id="score">Score: 0</div>
<button id="startBtn">Start</button>

<div id="game"></div>

<audio id="music" src="music.mp3"></audio>

<script>

const game = document.getElementById("game")
const scoreText = document.getElementById("score")
const startBtn = document.getElementById("startBtn")
const music = document.getElementById("music")

let tiles = []
let score = 0
let speed = 2
let running = false

function createTile(){

  const tile = document.createElement("div")
  tile.classList.add("tile")

  const column = Math.floor(Math.random()*4)

  tile.style.left = column*80+"px"
  tile.style.top = "-130px"

  tile.onclick = function(e){

    if(!running) return

    score++
    scoreText.innerText = "Score: " + score

    tile.remove()
    tiles = tiles.filter(t=>t!==tile)

    e.stopPropagation()

  }

  game.appendChild(tile)
  tiles.push(tile)
}

function gameOver(){

  running=false
  music.pause()

  alert("ゲームオーバー\nScore: "+score)

  tiles.forEach(t=>t.remove())
  tiles=[]

}

function update(){

  if(!running) return

  tiles.forEach(tile=>{

    let top = parseInt(tile.style.top)

    top += speed

    tile.style.top = top+"px"

    if(top>520){
      gameOver()
    }

  })

  requestAnimationFrame(update)

}

game.onclick=function(){
  if(running) gameOver()
}

function startGame(){

  tiles.forEach(t=>t.remove())
  tiles=[]

  score=0
  scoreText.innerText="Score: 0"

  running=true

  music.currentTime=0
  music.play()

  setInterval(()=>{
    if(running) createTile()
  },600)

  update()
}

startBtn.onclick=startGame

</script>

</body>
</html>
